<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>UnisonOS Console</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1f242c;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --ok: #3fb950;
    --warn: #d29922;
    --err: #f85149;
    --hover: #1f242c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 13px/1.45 ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0; font-size: 16px; font-weight: 600;
    color: var(--accent); letter-spacing: 0.5px;
  }
  header .status { color: var(--muted); font-size: 12px; }
  header .right { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

  button, .btn {
    background: transparent; color: var(--text);
    border: 1px solid var(--border); padding: 4px 10px;
    cursor: pointer; font: inherit; border-radius: 4px;
  }
  button:hover { background: var(--hover); border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.danger:hover { border-color: var(--err); }
  button.primary { border-color: var(--accent); color: var(--accent); }
  input[type=text], input[type=password] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 4px; font: inherit;
  }

  main {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    height: calc(100% - 49px);
  }
  .top { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; min-height: 0; }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .panel h2 {
    margin: 0; padding: 8px 12px; font-size: 12px; font-weight: 600;
    color: var(--muted); border-bottom: 1px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel h2 .right { display: flex; gap: 6px; }
  .panel .body { flex: 1; overflow: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 11px; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: var(--hover); }
  tr.row.selected { background: var(--panel2); border-left: 2px solid var(--accent); }

  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--err); margin-right: 6px; vertical-align: middle;
  }
  .status-dot.ok { background: var(--ok); }
  .status-dot.warn { background: var(--warn); }

  .small { font-size: 11px; color: var(--muted); }

  /* Activity panel: structured event blocks */
  #log { padding: 6px 10px; font-size: 12px; }
  .ev {
    margin: 6px 0; padding: 6px 10px;
    border-left: 2px solid var(--border); background: var(--panel2);
    border-radius: 0 4px 4px 0;
  }
  .ev.out { border-left-color: var(--accent); }
  .ev.in  { border-left-color: var(--ok); }
  .ev.err { border-left-color: var(--err); }
  .ev .head {
    display: flex; gap: 8px; align-items: baseline;
    font-size: 11px; color: var(--muted); margin-bottom: 2px;
  }
  .ev .head .who { color: var(--text); }
  .ev .body { white-space: pre-wrap; word-break: break-word; }
  .ev pre { margin: 2px 0 0; white-space: pre-wrap; word-break: break-word;
            font: 12px/1.4 ui-monospace, Menlo, Consolas, monospace; color: var(--text); }

  /* Command bar */
  .cmdbar {
    display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--border);
    background: var(--panel); align-items: center; flex-wrap: wrap;
  }
  .cmdbar .target {
    font-size: 12px; color: var(--muted);
    padding: 4px 10px; border: 1px dashed var(--border); border-radius: 4px;
  }
  .cmdbar .target b { color: var(--accent); }
  .cmdbar input[type=text] { flex: 1; min-width: 180px; }
  .cmdbar .quick {
    display: flex; gap: 4px; padding-left: 8px;
    border-left: 1px solid var(--border);
  }

  .auth-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .auth-overlay[hidden] { display: none !important; }
  .auth-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px; width: 420px;
  }
  .auth-card h2 { margin: 0 0 12px 0; color: var(--accent); }
  .auth-card label { display: block; margin: 8px 0 4px; color: var(--muted); }
  .auth-card input { width: 100%; }
  .auth-card .row { display: flex; gap: 8px; margin-top: 16px; }
  .auth-card .row button { flex: 1; }
  .auth-card .err { color: var(--err); font-size: 12px; min-height: 16px; }

  .ws-led {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--err); margin-right: 4px;
  }
  .ws-led.ok { background: var(--ok); }

  /* Device detail modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 80;
  }
  .modal-overlay[hidden] { display: none !important; }
  .modal-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; width: min(900px, 95vw); max-height: 85vh;
    display: flex; flex-direction: column;
  }
  .modal-card header {
    background: transparent; border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .modal-card header h2 { color: var(--accent); margin: 0; font-size: 16px; }
  .modal-card .body { padding: 12px 16px; overflow: auto; flex: 1; }
  .modal-card .footer {
    padding: 10px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .kv { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: 12px; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--text); word-break: break-all; }
  pre.json { background: var(--bg); padding: 8px; border-radius: 4px;
             font-size: 11px; overflow: auto; max-height: 200px; margin: 4px 0; }
</style>
</head>
<body>

<header>
  <h1>UnisonOS Console</h1>
  <span class="status"><span class="ws-led" id="ws-led"></span><span id="ws-state">disconnected</span></span>
  <span class="status" id="conn-status">checking…</span>
  <div class="right">
    <span class="small" id="device-count"></span>
    <button id="bulk-update-os" class="primary" title="exec 'upm upgrade -y' on every device">update OS all</button>
    <button id="bulk-update-pkg" class="primary" title="exec 'upm update' on every device">update pkgs all</button>
    <button id="bulk-reboot" class="danger" title="exec 'reboot' on every device">reboot all</button>
    <button id="logout-btn" title="forget the saved API config">logout</button>
  </div>
</header>

<main>
  <div class="top">
    <section class="panel">
      <h2>
        <span>Devices</span>
        <span class="right"><button id="refresh-btn">refresh</button></span>
      </h2>
      <div class="body">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Role</th><th>Name</th><th>Ver</th><th>Seen</th><th>Fuel</th><th>Inv</th>
            </tr>
          </thead>
          <tbody id="devices-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>
        <span>Selected device</span>
      </h2>
      <div class="body" id="dev-detail" style="padding: 10px 14px;">
        <span class="small">click a device row to inspect it</span>
      </div>
    </section>
  </div>

  <section class="panel">
    <h2>
      <span>Activity</span>
      <span class="right"><button id="clear-log">clear</button></span>
    </h2>
    <div class="body" id="log"></div>
    <div class="cmdbar">
      <span class="target">target: <b id="target-name">(none)</b></span>
      <input id="exec-input" type="text" placeholder='shell command for selected device — Enter to run' autocomplete="off" />
      <button id="exec-btn" class="primary">exec</button>
      <button id="ping-btn">ping</button>
      <span class="quick">
        <button data-quick="version">version</button>
        <button data-quick="service list">services</button>
        <button data-quick="upm list">pkgs</button>
        <button data-quick="upm upgrade -y">upgrade</button>
        <button data-quick="reboot" class="danger">reboot</button>
      </span>
    </div>
  </section>
</main>

<div class="modal-overlay" id="device-modal" hidden>
  <div class="modal-card">
    <header><h2 id="dm-title">Device</h2></header>
    <div class="body" id="dm-body"></div>
    <div class="footer" id="dm-actions"></div>
  </div>
</div>

<div class="auth-overlay" id="auth-overlay" hidden>
  <div class="auth-card">
    <h2>UnisonOS Console</h2>
    <p class="small">Enter the API base URL and bearer token of your VPS.</p>
    <label>API base</label>
    <input id="auth-base" type="text" placeholder="http://upm.hush-vp.ru:9273" />
    <label>Bearer token</label>
    <input id="auth-token" type="password" placeholder="(leave blank if server has no auth)" />
    <div class="err" id="auth-err"></div>
    <div class="row">
      <button id="auth-cancel">cancel</button>
      <button id="auth-ok" class="primary">connect</button>
    </div>
  </div>
</div>

<script>
(function () {
  const STORAGE_KEY = 'unison-console';
  const POLL_MS = 2000;

  const myId = sessionStorage.getItem('unison-console-id') ||
    ('console-' + Math.random().toString(36).slice(2, 10));
  sessionStorage.setItem('unison-console-id', myId);

  let cfg = null;
  let selectedId = null;
  let pollTimer = null;
  let ws = null;
  let wsRetry = null;
  let devices = {};
  const cmdHistory = [];
  let cmdHistoryIdx = -1;

  const $ = (id) => document.getElementById(id);
  const escapeHtml = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  function loadCfg() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }
    catch (e) { return null; }
  }
  function saveCfg(v) { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); }
  function clearCfg() { localStorage.removeItem(STORAGE_KEY); }

  function defaultBase() {
    const url = new URL(location.href);
    const port = url.port || (url.protocol === 'https:' ? 9274 : 9273);
    return `${url.protocol}//${url.hostname}:${port}`;
  }

  function showAuth(err) {
    $('auth-overlay').hidden = false;
    $('auth-err').textContent = err || '';
    if (!$('auth-base').value) $('auth-base').value = (cfg && cfg.base) || defaultBase();
    if (cfg && cfg.token) $('auth-token').value = cfg.token;
  }
  function hideAuth() { $('auth-overlay').hidden = true; }

  async function api(path, opts) {
    opts = opts || {};
    const headers = opts.headers || {};
    if (cfg && cfg.token) headers['Authorization'] = 'Bearer ' + cfg.token;
    if (opts.body && typeof opts.body !== 'string') {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    const r = await fetch(cfg.base + path, { ...opts, headers });
    if (r.status === 401 || r.status === 403) {
      showAuth('auth failed');
      throw new Error('unauthorized');
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const ct = r.headers.get('content-type') || '';
    return ct.includes('json') ? r.json() : r.text();
  }

  // ---- WebSocket -------------------------------------------------------

  function wsUrl() {
    return (cfg.base + '/ws')
      .replace(/^http(s)?:\/\//i, (m, s) => s ? 'wss://' : 'ws://')
      .replace(/:9273\b/, ':9275')
      .replace(/:9274\b/, ':9276');
  }
  function setWsState(state) {
    $('ws-state').textContent = state;
    $('ws-led').classList.toggle('ok', state === 'connected');
  }
  function connectWs() {
    if (ws) try { ws.close(); } catch (_) {}
    setWsState('connecting');
    let url = wsUrl();
    try { ws = new WebSocket(url); }
    catch (e) { logEvent('err', { who: 'ws', body: 'connect threw: ' + e.message }); scheduleWsRetry(); return; }
    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: 'auth', id: myId, token: (cfg && cfg.token) || '',
        role: 'console', name: 'web-console', version: 'dashboard'
      }));
    };
    ws.onmessage = (ev) => {
      let m;
      try { m = JSON.parse(ev.data); } catch (_) { return; }
      if (m.type === 'ready') { setWsState('connected'); return; }
      if (m.type === 'error') { setWsState('rejected'); logEvent('err', { who: 'ws', body: m.error }); return; }
      if (m.type === 'message' && m.envelope) handleInbound(m.envelope);
    };
    ws.onerror = () => setWsState('error');
    ws.onclose  = () => { setWsState('disconnected'); scheduleWsRetry(); };
  }
  function scheduleWsRetry() {
    if (wsRetry) clearTimeout(wsRetry);
    wsRetry = setTimeout(connectWs, 4000);
  }

  // ---- Helpers ---------------------------------------------------------

  function fmtAge(ms) {
    if (!ms) return '-';
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s/60) + 'm';
    return Math.floor(s/3600) + 'h';
  }
  function statusDotClass(ms) {
    if (!ms) return '';
    const age = (Date.now() - ms) / 1000;
    if (age < 30) return 'ok';
    if (age < 120) return 'warn';
    return '';
  }
  function isConsoleId(id) { return /^console-/i.test(id); }
  function isStaleConsole(d) {
    return d.role === 'console' || isConsoleId(d.id || '');
  }

  // ---- Activity log ----------------------------------------------------

  function logEvent(kind, opts) {
    const div = document.createElement('div');
    div.className = 'ev ' + kind;
    const t = new Date().toLocaleTimeString();
    const head = document.createElement('div');
    head.className = 'head';
    head.innerHTML =
      `<span>${t}</span>` +
      `<span class="who">${escapeHtml(opts.who || '')}</span>` +
      (opts.tag ? `<span>${escapeHtml(opts.tag)}</span>` : '');
    div.appendChild(head);
    const body = document.createElement('div');
    if (opts.pre) {
      const pre = document.createElement('pre');
      pre.textContent = opts.pre;
      body.appendChild(pre);
    } else if (opts.body) {
      body.textContent = opts.body;
    }
    div.appendChild(body);
    const log = $('log');
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    while (log.children.length > 300) log.removeChild(log.firstChild);
  }

  // ---- Devices ---------------------------------------------------------

  async function refresh() {
    try {
      devices = await api('/api/devices');
      $('conn-status').textContent = 'online';
      $('conn-status').style.color = 'var(--ok)';
      const ids = Object.keys(devices)
        .filter(id => id !== myId && !isStaleConsole({ ...(devices[id] || {}), id }))
        .sort();
      $('device-count').textContent = ids.length + ' device' + (ids.length === 1 ? '' : 's');
      const tbody = $('devices-tbody');
      tbody.innerHTML = '';
      for (const id of ids) {
        const d = devices[id];
        const m = d.metrics || {};
        const tr = document.createElement('tr');
        tr.className = 'row' + (id === selectedId ? ' selected' : '');
        tr.dataset.id = id;
        tr.innerHTML = `
          <td><span class="status-dot ${statusDotClass(d.last_seen)}"></span>${escapeHtml(id)}</td>
          <td>${escapeHtml(d.role || '-')}</td>
          <td>${escapeHtml(d.name || '-')}</td>
          <td>${escapeHtml(d.version || '-')}</td>
          <td>${fmtAge(d.last_seen)}</td>
          <td>${m.fuel ?? '-'}</td>
          <td>${m.inventory_used ?? '-'}</td>
        `;
        tr.addEventListener('click', () => selectDevice(id));
        tr.addEventListener('dblclick', () => openDeviceDetail(id));
        tbody.appendChild(tr);
      }
      if (selectedId) renderSelectedDetail();
    } catch (e) {
      $('conn-status').textContent = 'offline (' + e.message + ')';
      $('conn-status').style.color = 'var(--err)';
    }
  }

  function selectDevice(id) {
    selectedId = id;
    $('target-name').textContent = id;
    document.querySelectorAll('tr.row').forEach(tr => {
      tr.classList.toggle('selected', tr.dataset.id === id);
    });
    renderSelectedDetail();
  }

  function renderSelectedDetail() {
    if (!selectedId || !devices[selectedId]) {
      $('dev-detail').innerHTML = '<span class="small">click a device row to inspect it</span>';
      return;
    }
    const d = devices[selectedId];
    const m = d.metrics || {};
    const pos = m.position;
    $('dev-detail').innerHTML = `
      <div class="kv">
        <div class="k">ID</div>          <div class="v">${escapeHtml(selectedId)}</div>
        <div class="k">Name</div>        <div class="v">${escapeHtml(d.name || '-')}</div>
        <div class="k">Role</div>        <div class="v">${escapeHtml(d.role || '-')}</div>
        <div class="k">Version</div>     <div class="v">${escapeHtml(d.version || '-')}</div>
        <div class="k">Last seen</div>   <div class="v">${fmtAge(d.last_seen)} ago</div>
        <div class="k">Transport</div>   <div class="v">${escapeHtml(d.transport || 'http')}</div>
        <div class="k">Uptime</div>      <div class="v">${m.uptime ?? '-'} s</div>
        <div class="k">Fuel</div>        <div class="v">${m.fuel ?? '-'}</div>
        <div class="k">Inventory</div>   <div class="v">${m.inventory_used ?? '-'} / 16</div>
        <div class="k">Position</div>    <div class="v">${pos ? `${pos.x},${pos.y},${pos.z} (${escapeHtml(m.position_source || '?')})` : '-'}</div>
      </div>
      <div style="margin-top: 10px;"><button id="dev-detail-more">more / actions →</button></div>
    `;
    const more = document.getElementById('dev-detail-more');
    if (more) more.addEventListener('click', () => openDeviceDetail(selectedId));
  }

  // ---- Send / receive ---------------------------------------------------

  async function pushMessage(deviceId, body) {
    body = body || {};
    body.from = body.from || myId;
    try {
      await api('/api/messages/' + encodeURIComponent(deviceId),
                { method: 'POST', body });
      return true;
    } catch (e) {
      logEvent('err', { who: deviceId, body: 'send failed: ' + e.message });
      return false;
    }
  }

  async function execOn(id, cmd) {
    if (!id) { logEvent('err', { who: '-', body: 'select a device first' }); return; }
    if (!cmd) return;
    logEvent('out', { who: '→ ' + id, tag: 'exec', body: cmd });
    await pushMessage(id, { type: 'exec', command: cmd });
  }

  function handleInbound(envelope) {
    const body = envelope.msg || {};
    const from = body.from || (envelope.from) || '?';
    const t = body.type || '?';
    if (t === 'pong') {
      logEvent('in', { who: '← ' + from, tag: 'pong',
        body: 'rtt ' + (body.ts ? (Date.now() - body.ts) + 'ms' : '?') });
      return;
    }
    if (t === 'exec_reply') {
      const out = body.output || (body.err ? '[err] ' + body.err : '(no output)');
      logEvent(body.ok === false ? 'err' : 'in', {
        who: '← ' + from,
        tag: body.command ? `exec_reply: ${body.command}` : 'exec_reply',
        pre: out,
      });
      return;
    }
    if (t.endsWith('_reply')) {
      logEvent('in', { who: '← ' + from, tag: t,
        pre: JSON.stringify(body, null, 2) });
      return;
    }
    // Unknown message — just summarise.
    logEvent('in', { who: '← ' + from, tag: t,
      pre: JSON.stringify(body) });
  }

  // ---- Bulk ops --------------------------------------------------------

  async function bulkExec(cmd, label) {
    const ids = Object.keys(devices)
      .filter(id => id !== myId && !isStaleConsole({ ...(devices[id] || {}), id }));
    if (ids.length === 0) { logEvent('err', { who: '-', body: 'no devices online' }); return; }
    if (!confirm(`Run "${cmd}" on ${ids.length} device(s)?`)) return;
    logEvent('out', { who: 'broadcast', tag: label || cmd, body: `${cmd}  (${ids.length} target(s))` });
    for (const id of ids) await pushMessage(id, { type: 'exec', command: cmd });
  }

  // ---- Device detail modal --------------------------------------------

  function openDeviceDetail(id) {
    const d = devices[id];
    if (!d) return;
    selectedId = id; $('target-name').textContent = id;
    $('dm-title').textContent = `${id} — ${d.role || '?'} v${d.version || '?'}`;
    const dmBody = $('dm-body');
    const m = d.metrics || {};
    dmBody.innerHTML = `
      <pre class="json">${escapeHtml(JSON.stringify(d, null, 2))}</pre>
    `;
    const actions = $('dm-actions');
    actions.innerHTML = '';
    const buttons = [
      { label: 'ping', fn: () => pushMessage(id, { type: 'ping', ts: Date.now() }) },
      { label: 'version', cmd: 'version' },
      { label: 'service list', cmd: 'service list' },
      { label: 'upm list', cmd: 'upm list' },
      { label: 'upm upgrade', cmd: 'upm upgrade -y' },
      { label: 'reboot', cmd: 'reboot', danger: true },
    ];
    if (d.role === 'turtle') {
      buttons.splice(2, 0,
        { label: 'mine status', cmd: 'mine status' },
        { label: 'mine start', cmd: 'mine start' });
    }
    for (const b of buttons) {
      const el = document.createElement('button');
      el.textContent = b.label;
      if (b.danger) el.className = 'danger';
      el.addEventListener('click', () => {
        if (b.fn) b.fn(); else execOn(id, b.cmd);
      });
      actions.appendChild(el);
    }
    const close = document.createElement('button');
    close.textContent = 'close';
    close.style.marginLeft = 'auto';
    close.addEventListener('click', () => $('device-modal').hidden = true);
    actions.appendChild(close);
    $('device-modal').hidden = false;
  }

  // ---- Self-update -----------------------------------------------------

  let pageHash = null;
  async function checkSelfUpdate() {
    try {
      const r = await fetch(location.href + '?_=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) return;
      const txt = await r.text();
      let h = 0;
      for (let i = 0; i < txt.length; i++) h = ((h << 5) - h + txt.charCodeAt(i)) | 0;
      if (pageHash === null) { pageHash = h; return; }
      if (h !== pageHash) {
        logEvent('out', { who: 'console', body: 'dashboard updated upstream — reloading…' });
        setTimeout(() => location.reload(), 800);
      }
    } catch (_) {}
  }

  // ---- Wiring ----------------------------------------------------------

  function start() {
    cfg = loadCfg();
    if (!cfg) { showAuth(); return; }
    refresh();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(refresh, POLL_MS);
    connectWs();
    checkSelfUpdate();
    setInterval(checkSelfUpdate, 30000);
  }

  $('auth-ok').addEventListener('click', () => {
    cfg = {
      base: $('auth-base').value.trim() || defaultBase(),
      token: $('auth-token').value || '',
    };
    saveCfg(cfg); hideAuth(); start();
  });
  $('auth-cancel').addEventListener('click', () => hideAuth());
  $('logout-btn').addEventListener('click', () => {
    clearCfg(); cfg = null;
    if (pollTimer) clearInterval(pollTimer);
    if (ws) try { ws.close(); } catch(_) {}
    showAuth();
  });
  $('refresh-btn').addEventListener('click', refresh);
  $('clear-log').addEventListener('click', () => $('log').innerHTML = '');

  $('exec-btn').addEventListener('click', () => {
    const cmd = $('exec-input').value.trim();
    if (cmd) {
      cmdHistory.push(cmd); cmdHistoryIdx = cmdHistory.length;
      $('exec-input').value = '';
      execOn(selectedId, cmd);
    }
  });
  $('exec-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { $('exec-btn').click(); return; }
    if (e.key === 'ArrowUp' && cmdHistory.length > 0) {
      e.preventDefault();
      cmdHistoryIdx = Math.max(0, cmdHistoryIdx - 1);
      $('exec-input').value = cmdHistory[cmdHistoryIdx] || '';
    } else if (e.key === 'ArrowDown' && cmdHistory.length > 0) {
      e.preventDefault();
      cmdHistoryIdx = Math.min(cmdHistory.length, cmdHistoryIdx + 1);
      $('exec-input').value = cmdHistory[cmdHistoryIdx] || '';
    }
  });
  $('ping-btn').addEventListener('click', () => {
    if (!selectedId) return;
    pushMessage(selectedId, { type: 'ping', ts: Date.now() });
    logEvent('out', { who: '→ ' + selectedId, tag: 'ping' });
  });
  document.querySelectorAll('button[data-quick]').forEach(b => {
    b.addEventListener('click', () => execOn(selectedId, b.dataset.quick));
  });

  $('bulk-update-os').addEventListener('click', () => bulkExec('upm upgrade -y', 'OS upgrade'));
  $('bulk-update-pkg').addEventListener('click', () => bulkExec('upm update', 'package update'));
  $('bulk-reboot').addEventListener('click', () => bulkExec('reboot', 'reboot'));

  start();
})();
</script>
</body>
</html>
